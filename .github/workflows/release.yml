name: Release

# Push a version tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to build
# the artifacts and open a DRAFT GitHub release for review. hatch-vcs stamps the
# build with the tag's version, so the tag is the single source of truth.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # required for softprops/action-gh-release to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can resolve the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/*
